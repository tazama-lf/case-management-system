name: Docker Build & Push

on:
  push:
    branches:
      - '**' # all branches

env:
  IMAGE_NAME: case-management-system

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract branch name
        id: vars
        run: |
          BRANCH_NAME=${GITHUB_REF##*/}
          # Remove common prefixes
          BRANCH_NAME=${BRANCH_NAME#feat/}
          BRANCH_NAME=${BRANCH_NAME#bugfix/}
          BRANCH_NAME=${BRANCH_NAME#hotfix/}
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub (optional)
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/tazama-lf/${{ env.IMAGE_NAME }}:${BRANCH_NAME} \
            -t tazama-lf/${{ env.IMAGE_NAME }}:${BRANCH_NAME} \
            .

      - name: Push Docker images
        run: |
          docker push ghcr.io/tazama-lf/${{ env.IMAGE_NAME }}:${BRANCH_NAME}
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            docker push tazama-lf/${{ env.IMAGE_NAME }}:${BRANCH_NAME}
          fi
