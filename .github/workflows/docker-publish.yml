name: Publish Docker Image

on:
  push:
    branches:
      - manual-alert-handling   # or 'master' or any branch you want to publish from
    tags:
      - 'v*'   # optional: publish on version tags like v1.0.0

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            tazama/case-management-system:latest
            tazama/case-management-system:${{ github.sha }}
            tazama/case-management-system:${{ github.ref_name }}

