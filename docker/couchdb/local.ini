[couchdb]
single_node=true
uuid = your-generated-uuid-here

[httpd]
enable_cors = true
max_http_request_size = 4294967296

[cors]
origins = *
credentials = true
methods = GET, PUT, POST, HEAD, DELETE
headers = accept, authorization, content-type, origin, referer, x-csrf-token

[log]
level = info

[chttpd]
bind_address = 0.0.0.0
port = 5984

[admins]
# Add your admin username and password here
# Format: username = -pbkdf2-84d514f5643b739cbe1759e8fbd519c05d4ebd41,350d34e683d12cc760e59f4a73ecb9a2,10
# CouchDB will automatically hash the password on first startup
tazama = 1234

[chttpd_auth]
# Generate a secure random secret string
secret = your-secret-key-here