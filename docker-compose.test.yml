# =============================================================================
# Minimal Docker Compose for Quick Local Testing
# =============================================================================

version: '3.8'

services:
  # PostgreSQL Database only
  database:
    image: postgres:15-alpine
    container_name: tazama-cms-db-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: tazama_cms
      POSTGRES_USER: tazama_user
      POSTGRES_PASSWORD: tazama_password
    ports:
      - '5432:5432'
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tazama_user -d tazama_cms']
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  test_postgres_data:
    driver: local
