# =============================================================================
# Docker Compose for Development Environment
# =============================================================================

services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: tazama-cms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tazama_cms
      POSTGRES_USER: tazama_user
      POSTGRES_PASSWORD: tazama_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - tazama-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: tazama-cms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tazama-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tazama-cms-backend
    restart: unless-stopped
    depends_on:
      - database
      - redis
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - tazama-network

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tazama-cms-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - tazama-network

  # NATS Messaging (if needed for microservices)
  nats:
    image: nats:2.10-alpine
    container_name: tazama-cms-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--http_port", "8222"]
    networks:
      - tazama-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tazama-network:
    driver: bridge
